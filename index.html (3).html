<style>
  :root {
    --ink: #0B0B0A;

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: radial-gradient(circle at 50% 0%, #17150F 0%, var(--ink) 55%);
    color: var(--paper);

  .serif { font-family: 'Shippori Mincho', serif; }
  header { width: 100%; max-width: 480px; padding: 40px 24px 24px; text-align: center; box-sizing: border-box; }

  .preview img { width: 100%; height: 100%; object-fit: cover; }
  .placeholder { text-align: center; padding: 24px; }
  .placeholder .plus { font-size: 28px; color: var(--gold); margin-bottom: 10px; }
  .placeholder .txt { font-size: 13px; color: var(--muted); line-height: 1.8; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .btn {
    flex: 1; padding: 13px 0; border-radius: 3px; font-size: 13px; letter-spacing: 0.05em;

  .stat-card .value { font-family: 'Shippori Mincho', serif; font-size: 18px; color: var(--gold); }

  <header>
    <div class="eyebrow">T L E S &nbsp;/&nbsp; VISUAL SUCCESS</div>
    <h1 class="serif">顔計測 ── 468点実測</h1>
    <div class="sub">MediaPipe Face Mesh による実座標ベースの計測（ログイン不要）</div>
  </header>
  <main id="main"></main>

<script type="module">
import { FilesetResolver, FaceLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm";

// ---------------------------------------------------------------------------
// 状態管理(素のJSで簡易的にReactライクな状態+再描画を実装)
// ---------------------------------------------------------------------------
const state = {
  status: "idle", // idle | loading | adjusting | ready | analyzing | done | error
  imgSrc: null,
  imgW: 0,
  imgH: 0,
  rawImage: null, // {source, displayUrl, width, height}
  zoom: 1,
  pan: { x: 0, y: 0 },
  landmarks468: null, // 生の468(478)点
  namedLandmarks: null,
  measurements: null,
  faceShape: null,
  errorMsg: "",
};

const mainEl = document.getElementById("main");

// ---------------------------------------------------------------------------
// MediaPipe FaceLandmarker
// ---------------------------------------------------------------------------
let faceLandmarkerPromise = null;
function getFaceLandmarker() {
  if (!faceLandmarkerPromise) {
    faceLandmarkerPromise = (async () => {
      const filesetResolver = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );
      return await FaceLandmarker.createFromOptions(filesetResolver, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU",
        },
        runningMode: "IMAGE",
        numFaces: 1,
        outputFaceBlendshapes: false,
        outputFacialTransformationMatrixes: false,
      });
    })();
  }
  return faceLandmarkerPromise;
}
// バックグラウンドで先読みしておく(初回計測の待ち時間を短縮)
getFaceLandmarker().catch(() => {});

// MediaPipe Face Mesh 標準インデックスから、本アプリで使う名前付き特徴点を抽出する
const IDX = {
  hairline: 10,
  chinTip: 152,
  cheekboneLeft: 234,
  cheekboneRight: 454,
  jawLeft: 172,
  jawRight: 397,
  noseBottom: 2,
  faceEdgeLeft: 127,
  faceEdgeRight: 356,
  eyeOuterLeft: 33,
  eyeInnerLeft: 133,
  eyeInnerRight: 362,
  eyeOuterRight: 263,
  glabella: 168,
  noseTip: 4,
  philtrum: 164,
  mouthCornerLeft: 61,
  mouthCornerRight: 291,
  eyeTopLeft: 159,
  eyeBottomLeft: 145,
  eyeTopRight: 386,
  eyeBottomRight: 374,
  eyebrowOuterLeft: 46,
  eyebrowOuterRight: 276,
  noseAlaLeft: 129,
  noseAlaRight: 358,
  mouthTopCenter: 0,
};
const BROW_L_IDX = 105;
const BROW_R_IDX = 334;

function extractNamedLandmarks(raw) {
  const lm = {};
  for (const [name, idx] of Object.entries(IDX)) {
    const p = raw[idx];
    if (p) lm[name] = { x: p.x, y: p.y };
  }
  if (raw[BROW_L_IDX] && raw[BROW_R_IDX]) {
    lm.browLine = {
      x: (raw[BROW_L_IDX].x + raw[BROW_R_IDX].x) / 2,
      y: (raw[BROW_L_IDX].y + raw[BROW_R_IDX].y) / 2,
    };
  }
  // MediaPipeのメッシュは髪の生え際までカバーしていないため、インデックス10は
  // 額の中間あたりに位置する(実際の生え際より低い)。三分割(額≒中顔)の一般的な
  // 比率を仮定し、「眉下〜鼻下」と同じ幅だけ上に外挿して生え際を推定する。
  if (lm.browLine && lm.noseBottom) {
    const midfaceSpan = lm.noseBottom.y - lm.browLine.y;
    lm.hairline = {
      x: lm.browLine.x,
      y: lm.browLine.y - midfaceSpan,
    };
  }
  const avg = (pts) => ({
    x: pts.reduce((s, p) => s + p.x, 0) / pts.length,
    y: pts.reduce((s, p) => s + p.y, 0) / pts.length,
  });
  if (lm.eyeOuterLeft && lm.eyeInnerLeft && lm.eyeTopLeft && lm.eyeBottomLeft) {
    lm.pupilLeft = avg([lm.eyeOuterLeft, lm.eyeInnerLeft, lm.eyeTopLeft, lm.eyeBottomLeft]);
  }
  if (lm.eyeOuterRight && lm.eyeInnerRight && lm.eyeTopRight && lm.eyeBottomRight) {
    lm.pupilRight = avg([lm.eyeOuterRight, lm.eyeInnerRight, lm.eyeTopRight, lm.eyeBottomRight]);
  }
  return lm;
}

// ---------------------------------------------------------------------------
// 計測ロジック(実ピクセル座標に変換してから計算、瞳孔間距離6.3cmを基準にcm推定)
// ---------------------------------------------------------------------------
const FACE_SHAPE_NOTES = {
  卵型: "縦横バランスが取れ、額と顎の幅差が緩やかな輪郭です",
  丸型: "縦横の比率が近く、頬の丸みが特徴的な輪郭です",
  面長: "縦の比率が高く、額から顎までが長めの輪郭です",
  逆三角形: "額・頬骨幅に対して顎が細く、シャープな輪郭です",
  ベース型: "顎の幅がしっかりしており、輪郭の下部に安定感があります",
  ハート型: "額側が広く、顎にかけて細くなる輪郭です",
};
const ASSUMED_PUPIL_DISTANCE_CM = 6.3;

function toPx(p, w, h) {
  if (!p) return null;
  return { x: p.x * w, y: p.y * h };
}
function distPx(a, b) {
  if (!a || !b) return null;
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function computeMeasurements(lm, imgW, imgH) {
  if (!lm || !imgW || !imgH) return null;
  const px = {};
  Object.keys(lm).forEach((k) => { px[k] = toPx(lm[k], imgW, imgH); });

  const pupilDistPx = distPx(px.pupilLeft, px.pupilRight);
  const cmPerPx = pupilDistPx ? ASSUMED_PUPIL_DISTANCE_CM / pupilDistPx : null;
  const toCm = (pxLen) => (cmPerPx && pxLen != null ? Math.round(pxLen * cmPerPx * 10) / 10 : null);

  const faceHeightPx = distPx(px.hairline, px.chinTip);
  const faceWidthPx = distPx(px.cheekboneLeft, px.cheekboneRight);
  const faceRatio = faceHeightPx && faceWidthPx ? faceHeightPx / faceWidthPx : null;
  const jawWidthPx = distPx(px.jawLeft, px.jawRight);
  const foreheadWidthPx = distPx(px.faceEdgeLeft, px.faceEdgeRight);

  let faceShape = null;
  if (faceRatio && jawWidthPx && foreheadWidthPx && faceWidthPx) {
    const jawToCheek = jawWidthPx / faceWidthPx;
    const foreheadToCheek = foreheadWidthPx / faceWidthPx;
    if (faceRatio > 1.55) faceShape = "面長";
    else if (jawToCheek > 0.92) faceShape = foreheadToCheek < jawToCheek - 0.06 ? "ベース型" : "丸型";
    else if (jawToCheek < 0.72 && foreheadToCheek > 0.85) faceShape = "逆三角形";
    else if (jawToCheek < 0.78 && foreheadToCheek > jawToCheek + 0.13) faceShape = "ハート型";
    else faceShape = "卵型";
  }

  let thirds = null;
  if (px.hairline && px.browLine && px.noseBottom && px.chinTip) {
    const foreheadPx = px.browLine.y - px.hairline.y;
    const midfacePx = px.noseBottom.y - px.browLine.y;
    const lowerfacePx = px.chinTip.y - px.noseBottom.y;
    const totalPx = px.chinTip.y - px.hairline.y || 1;
    thirds = {
      forehead: Math.round((foreheadPx / totalPx) * 100),
      midface: Math.round((midfacePx / totalPx) * 100),
      lowerface: Math.round((lowerfacePx / totalPx) * 100),
      foreheadCm: toCm(foreheadPx),
      midfaceCm: toCm(midfacePx),
      lowerfaceCm: toCm(lowerfacePx),
    };
  }

  let fiveEyes = null;
  if (px.faceEdgeLeft && px.eyeOuterLeft && px.eyeInnerLeft && px.eyeInnerRight && px.eyeOuterRight && px.faceEdgeRight) {
    const s1px = px.eyeOuterLeft.x - px.faceEdgeLeft.x;
    const s2px = px.eyeInnerLeft.x - px.eyeOuterLeft.x;
    const s3px = px.eyeInnerRight.x - px.eyeInnerLeft.x;
    const s4px = px.eyeOuterRight.x - px.eyeInnerRight.x;
    const s5px = px.faceEdgeRight.x - px.eyeOuterRight.x;
    const totalPx = px.faceEdgeRight.x - px.faceEdgeLeft.x || 1;
    fiveEyes = {
      section1: Math.round((s1px / totalPx) * 100), section1Cm: toCm(s1px),
      section2: Math.round((s2px / totalPx) * 100), section2Cm: toCm(s2px),
      section3: Math.round((s3px / totalPx) * 100), section3Cm: toCm(s3px),
      section4: Math.round((s4px / totalPx) * 100), section4Cm: toCm(s4px),
      section5: Math.round((s5px / totalPx) * 100), section5Cm: toCm(s5px),
    };
  }

  let eyeSize = null;
  const eyeWidthLeftPx = distPx(px.eyeOuterLeft, px.eyeInnerLeft);
  const eyeWidthRightPx = distPx(px.eyeOuterRight, px.eyeInnerRight);
  const eyeHeightLeftPx = distPx(px.eyeTopLeft, px.eyeBottomLeft);
  const eyeHeightRightPx = distPx(px.eyeTopRight, px.eyeBottomRight);
  if (eyeWidthLeftPx && eyeWidthRightPx && eyeHeightLeftPx && eyeHeightRightPx) {
    const widthDiffPct = (Math.abs(eyeWidthLeftPx - eyeWidthRightPx) / ((eyeWidthLeftPx + eyeWidthRightPx) / 2)) * 100;
    const heightDiffPct = (Math.abs(eyeHeightLeftPx - eyeHeightRightPx) / ((eyeHeightLeftPx + eyeHeightRightPx) / 2)) * 100;
    const widthLeftCm = toCm(eyeWidthLeftPx), widthRightCm = toCm(eyeWidthRightPx);
    const heightLeftCm = toCm(eyeHeightLeftPx), heightRightCm = toCm(eyeHeightRightPx);
    // 表示しているcm値(四捨五入後)を基準に大小を判定する。生のピクセル値で
    // 判定すると、表示上は同じcmなのに「大きい」と出てしまうことがあるため。
    const leftSumCm = (widthLeftCm ?? 0) + (heightLeftCm ?? 0);
    const rightSumCm = (widthRightCm ?? 0) + (heightRightCm ?? 0);
    eyeSize = {
      widthLeftCm, widthRightCm, heightLeftCm, heightRightCm,
      widthDiffCm: toCm(Math.abs(eyeWidthLeftPx - eyeWidthRightPx)),
      widthDiffPct: Math.round(widthDiffPct), heightDiffPct: Math.round(heightDiffPct),
      largerSide:
        leftSumCm > rightSumCm ? "左目の方が大きい"
        : rightSumCm > leftSumCm ? "右目の方が大きい"
        : "ほぼ同じ",
    };
  }

  let symmetry = null;
  const centerPts = [px.glabella, px.noseTip, px.philtrum, px.chinTip].filter(Boolean);
  if (centerPts.length >= 2 && faceWidthPx) {
    const avgX = centerPts.reduce((s, p) => s + p.x, 0) / centerPts.length;
    const centerDeviation = centerPts.reduce((s, p) => s + Math.abs(p.x - avgX), 0) / centerPts.length;
    const centerScore = Math.max(0, 100 - (centerDeviation / faceWidthPx) * 400);
    const pairs = [
      [px.pupilLeft, px.pupilRight],
      [px.mouthCornerLeft, px.mouthCornerRight],
      [px.eyebrowOuterLeft, px.eyebrowOuterRight],
      [px.noseAlaLeft, px.noseAlaRight],
      [px.eyeOuterLeft, px.eyeOuterRight],
    ].filter(([l, r]) => l && r);
    let mirrorScore = 100;
    if (pairs.length > 0) {
      let asymSum = 0;
      pairs.forEach(([l, r]) => {
        const dl = Math.abs(avgX - l.x);
        const dr = Math.abs(r.x - avgX);
        asymSum += Math.abs(dl - dr) / ((dl + dr) / 2 || 1);
      });
      mirrorScore = Math.max(0, 100 - (asymSum / pairs.length) * 100);
    }
    let eyeSizeScore = 100;
    if (eyeSize) eyeSizeScore = Math.max(0, 100 - (eyeSize.widthDiffPct + eyeSize.heightDiffPct));
    symmetry = Math.round((centerScore + mirrorScore + eyeSizeScore) / 3);
  }

  let goldenRatio = null;
  if (faceRatio) {
    goldenRatio = Math.max(0, Math.round(100 - Math.abs(faceRatio - 1.618) * 60));
    goldenRatio = Math.min(100, goldenRatio);
  }

  return {
    faceHeightCm: toCm(faceHeightPx),
    faceWidthCm: toCm(faceWidthPx),
    faceRatio: faceRatio ? Math.round(faceRatio * 100) / 100 : null,
    thirds, fiveEyes, symmetry, eyeSize, goldenRatio, faceShape,
    calibrated: !!cmPerPx,
  };
}

// ---------------------------------------------------------------------------
// 画像ユーティリティ
// ---------------------------------------------------------------------------
function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました"));
    reader.readAsDataURL(file);
  });
}
function loadImageEl(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("画像のデコードに失敗しました"));
    img.src = src;
  });
}

function getCoverGeometry(containerW, containerH, imgW, imgH, zoom) {
  const baseScale = Math.max(containerW / imgW, containerH / imgH);
  const scale = baseScale * zoom;
  const dW = imgW * scale;
  const dH = imgH * scale;
  const maxPanX = dW >= containerW ? (dW - containerW) / 2 : (containerW - dW) / 2 + dW / 2;
  const maxPanY = dH >= containerH ? (dH - containerH) / 2 : (containerH - dH) / 2 + dH / 2;
  return { scale, dW, dH, maxPanX, maxPanY };
}

// ---------------------------------------------------------------------------
// 描画: カード(通常) / カード(位置調整)
// ---------------------------------------------------------------------------
function render() {
  if (state.status === "adjusting" && state.rawImage) {
    mainEl.innerHTML = adjustCardHTML();
    wireAdjustCard();
  } else {
    mainEl.innerHTML = normalCardHTML();
    wireNormalCard();
  }
}

function faceGuideSVG(opacity) {
  const top = 75, bottom = 335;
  const third1 = top + (bottom - top) / 3;
  const third2 = top + ((bottom - top) * 2) / 3;
  return `
    <svg id="adjustGuide" viewBox="0 0 300 400" style="opacity:${opacity}">
      <ellipse cx="150" cy="205" rx="92" ry="130" fill="none" stroke="#C6A15B" stroke-width="2" stroke-dasharray="6 6" />
      <line x1="58" y1="${third1}" x2="242" y2="${third1}" stroke="#C6A15B" stroke-width="1" stroke-dasharray="3 5" opacity="0.6" />
      <line x1="58" y1="${third2}" x2="242" y2="${third2}" stroke="#C6A15B" stroke-width="1" stroke-dasharray="3 5" opacity="0.6" />
      <line x1="150" y1="${top}" x2="150" y2="${bottom}" stroke="#F4EFE4" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6" />
    </svg>`;
}

function adjustCardHTML() {
  return `
    <div class="card">
      <div id="adjustStage">
        <img id="adjustImg" src="${state.rawImage.displayUrl}" draggable="false" />
        ${faceGuideSVG(0.85)}
      </div>
      <div class="zoom-row">
        <span>縮小</span>
        <input id="zoomSlider" type="range" min="0.4" max="2.5" step="0.02" value="${state.zoom}" />
        <span>拡大</span>
      </div>
      <div class="hint">ドラッグで位置調整、スライダーで拡大・縮小できます。中心の縦線を鼻筋に、横の2本の線を眉のライン・鼻下のラインに合わせて調整してください</div>
      <div class="btn-row">
        <button id="confirmCropBtn" class="btn btn-primary">位置を確定する</button>
        <button id="adjustResetBtn" class="btn btn-ghost">やり直す</button>
      </div>
    </div>`;
}

function normalCardHTML() {
  const hasImg = !!state.imgSrc;
  const showGuideStatic = !hasImg && state.status !== "loading";
  return `
    <div class="card">
      <div class="preview ${hasImg ? "has-img" : ""}" id="previewArea">
        ${
          hasImg
            ? `<img src="${state.imgSrc}" alt="写真" />`
            : state.status === "loading"
            ? `<div style="font-size:12px;color:var(--muted);letter-spacing:0.1em;">読み込み中 ……</div>`
            : `<div class="placeholder"><div class="plus">＋</div><div class="txt">枠に顔を合わせて撮影・選択</div></div>`
        }
        ${showGuideStatic ? faceGuideSVG(0.35) : ""}
        ${state.status === "analyzing" ? `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(11,11,10,0.55);font-size:12px;letter-spacing:0.1em;color:var(--gold);">468点検出中 ……</div>` : ""}
        ${state.landmarks468 && state.status === "done" ? `<canvas id="landmarkCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>` : ""}
      </div>

      ${!hasImg && state.status !== "loading" ? `
        <div class="hint">楕円の枠に顔がぴったり収まるよう、正面から適度な距離で撮影してください</div>
        <div class="btn-row">
          <button id="pickAlbumBtn" class="btn">アルバムから選ぶ</button>
          <button id="pickCameraBtn" class="btn">その場で撮影</button>
        </div>` : ""}

      <input id="fileInputAlbum" type="file" accept="image/*" />
      <input id="fileInputCamera" type="file" accept="image/*" capture="user" />

      <div class="btn-row">
        ${hasImg && state.status !== "analyzing" && state.status !== "done" ? `<button id="analyzeBtn" class="btn btn-primary">計測する</button>` : ""}
        ${state.status === "analyzing" ? `<div class="status-text">計測中 ……</div>` : ""}
        ${hasImg && state.rawImage && state.status !== "analyzing" ? `<button id="backToAdjustBtn" class="btn btn-outline">位置を調整し直す</button>` : ""}
        ${(hasImg || state.status === "error") && state.status !== "analyzing" ? `<button id="resetBtn" class="btn btn-ghost">やり直す</button>` : ""}
      </div>

      ${state.errorMsg ? `<div class="error">${escapeHtml(state.errorMsg)}</div>` : ""}
    </div>

    ${state.status === "done" && state.measurements ? resultsHTML() : ""}
  `;
}

function barRow(label, pct, cm) {
  const displayText = cm != null ? `${cm}cm` : `${pct}%`;
  return `
    <div class="bar-row">
      <div class="top"><span>${label}</span><span class="v">${displayText}</span></div>
      <div class="bar-track"><div class="bar-fill" data-pct="${pct}"></div></div>
    </div>`;
}
function statCard(label, value, sub) {
  return `
    <div class="stat-card">
      <div class="label">${label}</div>
      <div class="value">${value ?? "-"}</div>
      ${sub ? `<div class="sub">${sub}</div>` : ""}
    </div>`;
}

      <div class="badge-row"><span class="badge">468点ランドマーク実測(MediaPipe)</span></div>

      <div class="shape-block">
        <div class="label">FACE SHAPE</div>
        <div class="value serif">${state.faceShape ?? "-"}</div>
        <div class="note">${FACE_SHAPE_NOTES[state.faceShape] ?? ""}</div>
      </div>

      <div class="section">
        <div class="section-title"><span class="dash"></span>顔縦・顔幅</div>
        <div class="stat-row">

          ${statCard("顔の横幅", m.faceWidthCm != null ? m.faceWidthCm + "cm" : "-")}
          ${statCard("黄金比スコア", m.goldenRatio, "/ 100")}
        </div>
        <div class="stat-row" style="margin-top:12px;">
          ${statCard("縦横比", m.faceRatio, "縦 ÷ 横")}

        </div>
      </div>

      <div class="section">
        <div class="section-title"><span class="dash"></span>三分割（生え際・眉下・鼻下・顎先）</div>
        ${barRow("額", m.thirds?.forehead ?? 0, m.thirds?.foreheadCm)}
        ${barRow("中顔", m.thirds?.midface ?? 0, m.thirds?.midfaceCm)}
        ${barRow("下顔", m.thirds?.lowerface ?? 0, m.thirds?.lowerfaceCm)}
      </div>

      <div class="section">
        <div class="section-title"><span class="dash"></span>五眼（顔幅を目の横幅で5分割）</div>
        ${barRow("① 左顔外側〜左目尻", m.fiveEyes?.section1 ?? 0, m.fiveEyes?.section1Cm)}
        ${barRow("② 左目尻〜左目頭", m.fiveEyes?.section2 ?? 0, m.fiveEyes?.section2Cm)}
        ${barRow("③ 左目頭〜右目頭", m.fiveEyes?.section3 ?? 0, m.fiveEyes?.section3Cm)}
        ${barRow("④ 右目頭〜右目尻", m.fiveEyes?.section4 ?? 0, m.fiveEyes?.section4Cm)}
        ${barRow("⑤ 右目尻〜右顔外側", m.fiveEyes?.section5 ?? 0, m.fiveEyes?.section5Cm)}
        <div class="note-text">理想は①〜⑤の長さがすべて近い値になるバランスです</div>
      </div>

      <div class="section">
        <div class="section-title"><span class="dash"></span>目の左右差</div>
        <div class="stat-row">
          ${statCard("左目 横幅", m.eyeSize?.widthLeftCm != null ? m.eyeSize.widthLeftCm + "cm" : "-")}
          ${statCard("右目 横幅", m.eyeSize?.widthRightCm != null ? m.eyeSize.widthRightCm + "cm" : "-")}
        </div>
        <div class="stat-row" style="margin-top:12px;">
          ${statCard("左目 縦幅", m.eyeSize?.heightLeftCm != null ? m.eyeSize.heightLeftCm + "cm" : "-")}
          ${statCard("右目 縦幅", m.eyeSize?.heightRightCm != null ? m.eyeSize.heightRightCm + "cm" : "-")}
        </div>
        <div class="note-text">${m.eyeSize?.largerSide ?? ""}${m.eyeSize?.widthDiffCm != null ? `（横幅差 約${m.eyeSize.widthDiffCm}cm）` : ""}</div>
      </div>

      ${m.calibrated ? `<div class="note-text" style="margin-top:20px;text-align:center;">※ cm表示は瞳孔間距離の平均値(6.3cm)を基準にした推定値です。実際の距離とは誤差が生じる場合があります</div>` : ""}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ---------------------------------------------------------------------------
// イベント配線
// ---------------------------------------------------------------------------
function wireNormalCard() {
  const previewArea = document.getElementById("previewArea");
  const albumInput = document.getElementById("fileInputAlbum");
  const cameraInput = document.getElementById("fileInputCamera");
  const pickAlbumBtn = document.getElementById("pickAlbumBtn");
  const pickCameraBtn = document.getElementById("pickCameraBtn");
  const analyzeBtn = document.getElementById("analyzeBtn");
  const backToAdjustBtn = document.getElementById("backToAdjustBtn");
  const resetBtn = document.getElementById("resetBtn");

  if (previewArea && !state.imgSrc && state.status !== "loading") {
    previewArea.addEventListener("click", () => albumInput?.click());
  }
  pickAlbumBtn?.addEventListener("click", () => albumInput.click());
  pickCameraBtn?.addEventListener("click", () => cameraInput.click());
  albumInput?.addEventListener("change", (e) => handleFile(e.target.files?.[0]));
  cameraInput?.addEventListener("change", (e) => handleFile(e.target.files?.[0]));
  analyzeBtn?.addEventListener("click", runAnalysis);
  backToAdjustBtn?.addEventListener("click", () => { state.status = "adjusting"; render(); });
  resetBtn?.addEventListener("click", resetAll);

  // バー・キャンバスの描画(DOM構築後に実行)
  document.querySelectorAll(".bar-fill").forEach((el) => {
    const pct = Number(el.dataset.pct) || 0;
    requestAnimationFrame(() => { el.style.width = pct + "%"; });
  });
  if (state.status === "done" && state.landmarks468) {
    drawLandmarkCanvas();
  }
}

let dragState = null;
function wireAdjustCard() {
  const stage = document.getElementById("adjustStage");
  const img = document.getElementById("adjustImg");
  const slider = document.getElementById("zoomSlider");
  const confirmBtn = document.getElementById("confirmCropBtn");
  const resetBtn = document.getElementById("adjustResetBtn");

  function applyTransform() {
    img.style.transform = `translate(${state.pan.x}px, ${state.pan.y}px) scale(${state.zoom})`;
  }
  applyTransform();

  function clampPan(next, zoom) {
    const rect = stage.getBoundingClientRect();
    const { maxPanX, maxPanY } = getCoverGeometry(rect.width, rect.height, state.rawImage.width, state.rawImage.height, zoom);
    return {
      x: Math.max(-maxPanX, Math.min(maxPanX, next.x)),
      y: Math.max(-maxPanY, Math.min(maxPanY, next.y)),
    };
  }

  stage.addEventListener("pointerdown", (e) => {
    stage.setPointerCapture(e.pointerId);
    stage.classList.add("dragging");
    dragState = { x: e.clientX, y: e.clientY, panX: state.pan.x, panY: state.pan.y };
  });
  stage.addEventListener("pointermove", (e) => {
    if (!dragState) return;
    const dx = e.clientX - dragState.x;
    const dy = e.clientY - dragState.y;
    state.pan = clampPan({ x: dragState.panX + dx, y: dragState.panY + dy }, state.zoom);
    applyTransform();
  });
  function endDrag() { dragState = null; stage.classList.remove("dragging"); }
  stage.addEventListener("pointerup", endDrag);
  stage.addEventListener("pointercancel", endDrag);

  slider.addEventListener("input", (e) => {
    const z = Number(e.target.value);
    state.zoom = z;
    state.pan = clampPan(state.pan, z);
    applyTransform();
  });

  confirmBtn.addEventListener("click", () => {
    const rect = stage.getBoundingClientRect();
    const containerW = rect.width, containerH = rect.height;
    const outW = 750;
    const outH = Math.round(outW * (containerH / containerW));
    const { dW, dH } = getCoverGeometry(containerW, containerH, state.rawImage.width, state.rawImage.height, state.zoom);
    const canvasScale = outW / containerW;

    const canvas = document.createElement("canvas");
    canvas.width = outW; canvas.height = outH;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#141210";
    ctx.fillRect(0, 0, outW, outH);
    const dx = (containerW / 2 + state.pan.x - dW / 2) * canvasScale;
    const dy = (containerH / 2 + state.pan.y - dH / 2) * canvasScale;
    ctx.drawImage(state.rawImage.source, dx, dy, dW * canvasScale, dH * canvasScale);

    const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
    state.imgSrc = dataUrl;
    state.imgW = outW;
    state.imgH = outH;
    state.status = "ready";
    state.landmarks468 = null;
    state.measurements = null;
    render();
  });

  resetBtn.addEventListener("click", resetAll);
}

// ---------------------------------------------------------------------------
// ファイル選択・解析フロー
// ---------------------------------------------------------------------------
async function handleFile(file) {
  if (!file || !file.type.startsWith("image/")) {
    state.errorMsg = "画像ファイルを選択してください";
    state.status = "error";
    render();
    return;
  }
  state.errorMsg = "";
  state.imgSrc = null;
  state.status = "loading";
  render();
  try {
    const rawDataUrl = await fileToDataUrl(file);
    const img = await loadImageEl(rawDataUrl);
    state.rawImage = {
      source: img,
      displayUrl: rawDataUrl,
      width: img.naturalWidth || img.width,
      height: img.naturalHeight || img.height,
    };
    // 1倍(完全カバー)だと縦横どちらか一方が動かせる余地ゼロになるため、
    // 最初から少し拡大した状態にして、上下左右どちらにもドラッグできるようにする
    state.zoom = 1.15;
    state.pan = { x: 0, y: 0 };
    state.status = "adjusting";
  } catch (e) {
    state.errorMsg = `画像の読み込みに失敗しました（詳細: ${e && e.message}）`;
    state.status = "error";
  }
  render();
}

function resetAll() {
  state.status = "idle";
  state.imgSrc = null;
  state.imgW = 0; state.imgH = 0;
  state.rawImage = null;
  state.zoom = 1; state.pan = { x: 0, y: 0 };
  state.landmarks468 = null;
  state.namedLandmarks = null;
  state.measurements = null;
  state.faceShape = null;
  state.errorMsg = "";
  render();
}

async function runAnalysis() {
  if (!state.imgSrc) return;
  state.status = "analyzing";
  state.errorMsg = "";
  render();
  try {
    const landmarker = await getFaceLandmarker();
    const imgEl = await loadImageEl(state.imgSrc);
    const result = landmarker.detect(imgEl);
    if (!result.faceLandmarks || result.faceLandmarks.length === 0) {
      throw new Error("顔を検出できませんでした。正面を向いた、顔全体が写る写真でお試しください。");
    }
    const raw = result.faceLandmarks[0];
    const named = extractNamedLandmarks(raw);
    const measurements = computeMeasurements(named, state.imgW, state.imgH);

    state.landmarks468 = raw;
    state.namedLandmarks = named;
    state.measurements = measurements;
    state.faceShape = measurements?.faceShape ?? null;
    state.status = "done";
  } catch (e) {
    state.errorMsg = `計測に失敗しました（詳細: ${e && e.message}）`;
    state.status = "error";
  }
  render();
}

// ---------------------------------------------------------------------------
// 結果画面: 468点+ガイド線の描画
// ---------------------------------------------------------------------------
function drawLandmarkCanvas() {
  const canvas = document.getElementById("landmarkCanvas");
  if (!canvas || !state.landmarks468) return;
  const w = state.imgW, h = state.imgH;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext("2d");

  // 468(478)点を緑で描画
  ctx.fillStyle = "#00FF66";
  state.landmarks468.forEach((p, i) => {
    if (i >= 468) return; // 虹彩点は除く
    ctx.beginPath();
    ctx.arc(p.x * w, p.y * h, Math.max(1, w * 0.0022), 0, Math.PI * 2);
    ctx.fill();
  });

  // 使用した基準点+ガイド線をゴールドで重ねる
  const lm = state.namedLandmarks;
  if (lm) {
    const px = (p) => ({ x: p.x * w, y: p.y * h });
    if (lm.hairline && lm.browLine && lm.noseBottom && lm.chinTip) {
      ctx.strokeStyle = "rgba(198,161,91,0.5)";
      ctx.lineWidth = 1;
      [lm.hairline, lm.browLine, lm.noseBottom, lm.chinTip].forEach((p) => {
        const { y } = px(p);
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      });
    }
    if (lm.faceEdgeLeft && lm.eyeOuterLeft && lm.eyeInnerLeft && lm.eyeInnerRight && lm.eyeOuterRight && lm.faceEdgeRight) {
      ctx.strokeStyle = "rgba(198,161,91,0.35)";
      ctx.lineWidth = 1;
      [lm.faceEdgeLeft, lm.eyeOuterLeft, lm.eyeInnerLeft, lm.eyeInnerRight, lm.eyeOuterRight, lm.faceEdgeRight].forEach((p) => {
        const { x } = px(p);
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
      });
    }
    ctx.fillStyle = "#C6A15B";
    Object.values(lm).forEach((p) => {
      const { x, y } = px(p);
      ctx.beginPath(); ctx.arc(x, y, Math.max(2, w * 0.006), 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#0B0B0A"; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = "#C6A15B";
    });
  }
}

render();
</script>
